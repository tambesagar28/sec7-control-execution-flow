name: Reusable Deploy
on: 
    workflow_call:
        inputs:
            artifact-name:
                description: The name of deployable files
                required: false
                type: string
                default: dist
jobs:
  deploy:  
    runs-on: ubuntu-latest
    steps:
        - name: Get Code
          uses: actions/download-artifacts@v6
          with:
            name: $${{ inputs.artifact-name }}
        - name: List Files
          run: ls
        - name: Output Information
          run: echo "Deploying"
